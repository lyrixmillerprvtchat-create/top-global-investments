<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | Top Global Investments</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2 mb-6">
        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-sm">TG</div>
        <span class="font-bold text-lg">Top Global Investments</span>
      </a>
      <h1 class="text-3xl font-bold">Create your account</h1>
      <p class="text-gray-400 mt-2">Accounts are reviewed and approved by our team</p>
    </div>

    <div id="errorMsg" class="hidden mb-4 p-4 bg-red-900/40 border border-red-700 rounded-xl text-red-300 text-sm"></div>
    <div id="successMsg" class="hidden mb-4 p-4 bg-green-900/40 border border-green-700 rounded-xl text-green-300 text-sm"></div>

    <form id="registerForm" class="bg-gray-900 border border-gray-800 rounded-2xl p-8 space-y-5">
      <div>
        <label class="block text-sm text-gray-400 mb-1.5">Full Name <span class="text-red-400">*</span></label>
        <input type="text" id="full_name" required
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition"
          placeholder="John Doe" />
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1.5">Email Address <span class="text-red-400">*</span></label>
        <input type="email" id="email" required
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition"
          placeholder="you@example.com" />
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1.5">Phone Number <span class="text-gray-600">(optional)</span></label>
        <input type="tel" id="phone"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition"
          placeholder="+1 (555) 000-0000" />
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1.5">Password <span class="text-red-400">*</span></label>
        <input type="password" id="password" required
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition"
          placeholder="Minimum 6 characters" />
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1.5">Confirm Password <span class="text-red-400">*</span></label>
        <input type="password" id="confirm_password" required
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition"
          placeholder="Re-enter your password" />
      </div>
      <div class="pt-1">
        <label class="flex items-start gap-3 cursor-pointer">
          <input type="checkbox" id="terms" required class="w-4 h-4 mt-0.5 rounded bg-gray-800 border-gray-600 text-blue-600 flex-shrink-0" />
          <span class="text-sm text-gray-400">I agree to the <a href="#" class="text-blue-400 hover:underline">Terms and Conditions</a> and <a href="#" class="text-blue-400 hover:underline">Privacy Policy</a> <span class="text-red-400">*</span></span>
        </label>
      </div>
      <button type="submit" id="submitBtn"
        class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-semibold transition disabled:opacity-50">
        Create Account
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a href="/login" class="text-blue-400 hover:text-blue-300 font-medium">Sign in</a>
    </p>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');
      successMsg.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account…';

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            full_name: document.getElementById('full_name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            password: document.getElementById('password').value,
            confirm_password: document.getElementById('confirm_password').value,
            terms: document.getElementById('terms').checked
          })
        });
        const data = await res.json();
        if (data.success) {
          successMsg.textContent = data.message || 'Account created! Awaiting admin approval.';
          successMsg.classList.remove('hidden');
          form.reset();
        } else {
          errorMsg.textContent = data.error || 'Registration failed';
          errorMsg.classList.remove('hidden');
        }
      } catch {
        errorMsg.textContent = 'Network error. Please try again.';
        errorMsg.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
